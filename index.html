<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Carta para PEP</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding-top:40px;
overflow:hidden;
}

h1{
color:red;
font-size:42px;
}

img{
width:260px;
border-radius:15px;
margin:15px;
}

button{
font-size:22px;
padding:12px 25px;
margin:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

#sim{
background:black;
color:white;
border:2px solid white;
}

#nao{
background:red;
color:white;
position:absolute;
left:50%;
top:65%;
transform:translate(-50%,-50%);
}

#contador{
margin-top:10px;
font-size:18px;
color:#aaa;
}

#radar{
font-size:22px;
margin-top:20px;
color:orange;
}

.numero67{
position:absolute;
font-size:50px;
color:red;
animation:cair 6s linear forwards;
}

@keyframes cair{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

.treme{
animation:tremer 0.15s infinite;
}

@keyframes tremer{
0%{transform:translate(0,0)}
25%{transform:translate(6px,-6px)}
50%{transform:translate(-6px,6px)}
75%{transform:translate(6px,6px)}
100%{transform:translate(-6px,-6px)}
}

</style>
</head>

<body>

<h1>⚠️ ALERTA ⚠️</h1>

<p>Sistema suspeito detectado</p>

<img id="meme" src="inicio.jpg">

<h2 id="texto">Quer namorar comigo?</h2>

<button id="sim">SIM</button>
<button id="nao">NÃO</button>

<div id="contador"></div>
<div id="radar"></div>

<audio id="boom">
<source src="https://www.myinstants.com/media/sounds/vine-boom.mp3">
</audio>

<script>

let tentativas=0
let distancia=12

const nao=document.getElementById("nao")
const texto=document.getElementById("texto")
const meme=document.getElementById("meme")
const contador=document.getElementById("contador")
const radar=document.getElementById("radar")

const boom=document.getElementById("boom")

function fugir(){

tentativas++

boom.play()

contador.innerHTML="Tentativas de apertar NÃO: "+tentativas

if(tentativas==1){
texto.innerHTML="🤨 tentando apertar NÃO?"
meme.src="resenha.jpg"
}

if(tentativas==2){
texto.innerHTML="⚠️ tentativa de fuga detectada"
}

if(tentativas==3){
texto.innerHTML="aceita logo carai"
}

if(tentativas==4){
texto.innerHTML="🚨 ativando radar"
document.body.classList.add("treme")
iniciarRadar()
}

if(tentativas==5){
texto.innerHTML="💀 você insiste demais"
chuvaMemes()
numeros67()
}

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

nao.style.left=x+"px"
nao.style.top=y+"px"

}

nao.addEventListener("mouseover", fugir)

function iniciarRadar(){

let intervalo=setInterval(()=>{

distancia--

radar.innerHTML="🚨 fiscalização de memes chegando: "+distancia+" km"

if(distancia<=0){

radar.innerHTML="⚠️ inspeção de memes iniciada"

setTimeout(()=>{

document.body.classList.remove("treme")

},4000)

clearInterval(intervalo)

}

},1500)

}

function chuvaMemes(){

setInterval(()=>{

let img=document.createElement("img")

img.src=Math.random()>0.5?"inicio.jpg":"resenha.jpg"

img.style.position="absolute"
img.style.width="120px"
img.style.left=Math.random()*100+"vw"

document.body.appendChild(img)

setTimeout(()=>img.remove(),6000)

},800)

}

function numeros67(){

setInterval(()=>{

let n=document.createElement("div")

n.innerHTML="67"

n.className="numero67"

n.style.left=Math.random()*100+"vw"

document.body.appendChild(n)

setTimeout(()=>n.remove(),6000)

},600)

}

document.getElementById("sim").onclick=function(){

document.body.innerHTML=`

<h1>😳 VOCÊ APERTOU SIM</h1>

<p>analisando decisão...</p>

<img src="inicio.jpg">

`

setTimeout(()=>{

document.body.innerHTML=`

<h1>⏳ verificando compatibilidade...</h1>

<p>processando dados...</p>

`

},4000)

setTimeout(()=>{

document.body.innerHTML=`

<h1>⚠️ averiguando possível resenha</h1>

<img src="resenha.jpg">

<p>talvez eu só aceite em 2028</p>

<button onclick="continuar()">continuar</button>

`

},9000)

}

function continuar(){

document.body.innerHTML=`

<h1>📡 sistema reiniciado</h1>

<p>você realmente quer tentar de novo?</p>

<button onclick="location.reload()">reiniciar</button>

`

}

</script>

</body>
</html>
