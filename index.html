<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pergunta muito séria</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:40px;
}

button{
font-size:25px;
padding:15px 35px;
margin:10px;
cursor:pointer;
}

#nao{
position:relative;
}

img{
width:250px;
margin-top:30px;
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<h1>🚨 PERGUNTA MUITO SÉRIA 🚨</h1>

<img src="https://i.imgur.com/6X4Kp7R.png">

<h2>Quer namorar comigo? 😳</h2>

<button onclick="sim()">SIM</button>
<button id="nao">NÃO</button>

<script>

const nao=document.getElementById("nao")

nao.addEventListener("mouseover",()=>{

const x=Math.random()*window.innerWidth
const y=Math.random()*window.innerHeight

nao.style.position="absolute"
nao.style.left=x+"px"
nao.style.top=y+"px"

})

function sim(){

document.body.innerHTML=`

<h1>😳 CALMA</h1>
<h2>Analisando decisão...</h2>

`

setTimeout(()=>{

document.body.innerHTML=`

<h1>🤔 Hmmmm...</h1>
<h2>Talvez só em 2028</h2>

<img src="https://i.imgur.com/8QfQF5F.png">

<button onclick="continuar()">Continuar</button>

`

},3000)

}

function continuar(){

document.body.innerHTML=`

<h1>💀 VOCÊ CAIU NO SHITPOST</h1>

<img src="https://i.imgur.com/tV6Y9sX.gif">

<h2>Ronaldo vendo isso:</h2>

<button onclick="final()">ACEITAR DESTINO</button>

`

}

function final(){

document.body.innerHTML=`

<h1>😈 TROLL FINAL</h1>

<h2>Agora você oficialmente aceitou namorar comigo</h2>

<h3>Não tem botão de voltar</h3>

<h3>Parabéns 😂</h3>

<img src="https://i.imgur.com/Yq7XGQK.gif">

`

}

</script>

</body>
</html>
