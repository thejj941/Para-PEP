<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Carta para PEP</title>

<style>

/* ESTILO GERAL */

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ff3b3b;
font-size:42px;
margin-top:40px;
}

p{
font-size:20px;
}

/* BOTÕES */

button{
font-size:20px;
padding:12px 26px;
margin:15px;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

#sim{
background:black;
color:white;
border:2px solid white;
}

#nao{
background:red;
color:white;
position:absolute;
left:50%;
top:65%;
transform:translate(-50%,-50%);
}

/* CONTADORES */

#contador{
color:#bbb;
}

#radar{
color:orange;
font-size:22px;
}

/* EFEITO 67 */

.numero67{
position:absolute;
font-size:48px;
color:red;
animation:cair 6s linear forwards;
}

@keyframes cair{

0%{
transform:translateY(-100px);
}

100%{
transform:translateY(110vh);
}

}

/* TREMER */

.treme{
animation:tremer 0.15s infinite;
}

@keyframes tremer{

0%{transform:translate(0,0)}
25%{transform:translate(6px,-6px)}
50%{transform:translate(-6px,6px)}
75%{transform:translate(6px,6px)}
100%{transform:translate(-6px,-6px)}

}

/* FLASH */

.flash{
animation:flash 0.4s infinite;
}

@keyframes flash{

0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}

}

</style>

</head>
<body>

<h1>⚠ ALERTA DO SISTEMA ⚠</h1>

<p id="texto">atividade suspeita detectada</p>

<button id="sim">SIM</button>
<button id="nao">NÃO</button>

<p id="contador"></p>
<p id="radar"></p>

<script>

/* VARIÁVEIS */

let tentativas=0
let distancia=15
let fase=0

const texto=document.getElementById("texto")
const nao=document.getElementById("nao")
const contador=document.getElementById("contador")
const radar=document.getElementById("radar")

/* BOTÃO NÃO FUGINDO */

function fugir(){

tentativas++

contador.innerHTML="Tentativas de apertar NÃO: "+tentativas

if(tentativas==1){

texto.innerHTML="🤨 tentando apertar NÃO?"

}

if(tentativas==2){

texto.innerHTML="⚠ tentativa registrada"

}

if(tentativas==3){

texto.innerHTML="aceita logo carai"

}

if(tentativas==4){

texto.innerHTML="🚨 radar ativado"

document.body.classList.add("treme")

iniciarRadar()

}

if(tentativas==5){

texto.innerHTML="💀 modo 67 ativado"

chuva67()

}

if(tentativas>=7){

texto.innerHTML="💀 desistiu de apertar não né"

}

/* mover botão */

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

nao.style.left=x+"px"
nao.style.top=y+"px"

}

nao.addEventListener("mouseover", fugir)

/* RADAR */

function iniciarRadar(){

let intervalo=setInterval(()=>{

distancia--

radar.innerHTML="🚨 aproximação detectada: "+distancia+" km"

if(distancia<=0){

radar.innerHTML="⚠ inspeção iniciada"

document.body.classList.remove("treme")

clearInterval(intervalo)

}

},1400)

}

/* CHUVA 67 */

function chuva67(){

setInterval(()=>{

let n=document.createElement("div")

n.innerHTML="67"

n.className="numero67"

n.style.left=Math.random()*100+"vw"

document.body.appendChild(n)

setTimeout(()=>{

n.remove()

},6000)

},400)

}

/* BOTÃO SIM */

document.getElementById("sim").onclick=function(){

fase1()

}

/* FASES */

function fase1(){

document.body.innerHTML=`

<h1>😳 você apertou SIM</h1>

<p>analisando decisão...</p>

`

setTimeout(fase2,3000)

}

function fase2(){

document.body.innerHTML=`

<h1>⏳ verificando compatibilidade</h1>

<p>processando dados...</p>

`

setTimeout(fase3,3500)

}

function fase3(){

document.body.innerHTML=`

<h1 class="flash">⚠ averiguando possível resenha</h1>

<p>análise concluída</p>

<button onclick="numeroProibido()">entrar no número proibido</button>

`

}

/* NUMERO PROIBIDO */

function numeroProibido(){

document.body.innerHTML=`

<h1 style="color:red">⚠ NÚMERO PROIBIDO</h1>

<p>executando protocolo 67...</p>

`

setTimeout(()=>{

for(let i=0;i<80;i++){

let n=document.createElement("div")

n.innerHTML="67"

n.className="numero67"

n.style.left=Math.random()*100+"vw"

document.body.appendChild(n)

}

},2000)

}

</script>

</body>
</html>
